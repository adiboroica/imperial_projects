services:
  mongodb:
    image: mongo:6
    volumes:
      - mongodb_data:/data/db
      - ./backend/mongo-init:/docker-entrypoint-initdb.d
    ports:
      - "27017:27017"

  backend:
    build: ./backend
    environment:
      - DB_URL=mongodb://mongodb:27017/cyoa
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4.1}
      - COOKIE_SECRET=${COOKIE_SECRET:-change-me-to-a-random-secret}
      - PORT=8000
      - DEV=true
      - APP_URL=http://localhost:3000
    depends_on:
      - mongodb
    expose:
      - "8000"

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  mongodb_data:
