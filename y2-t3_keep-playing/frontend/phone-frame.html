<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Keep Playing</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      background: #e8e8e8;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    .phone {
      width: 390px;
      height: 844px;
      border-radius: 40px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3), 0 0 0 2px #1a1a1a;
      background: #1a1a1a;
      padding: 12px;
      position: relative;
    }
    .phone iframe {
      width: 100%;
      height: 100%;
      border: none;
      border-radius: 30px;
      background: white;
    }
    .notch {
      position: absolute;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      width: 120px;
      height: 28px;
      background: #1a1a1a;
      border-radius: 0 0 16px 16px;
      z-index: 10;
    }
  </style>
</head>
<body>
  <div class="phone">
    <div class="notch"></div>
    <iframe src="app.html"></iframe>
  </div>
</body>
</html>
