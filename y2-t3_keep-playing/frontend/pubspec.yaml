name: keep_playing_frontend
description: Frontend for the Keep Playing sports coaching platform
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: ">=3.7.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_bloc: 9.1.1
  http: 1.6.0
  shared_preferences: 2.5.4
  intl: 0.20.2
  table_calendar: 3.2.0
  flutter_rating_bar: 4.0.1
  url_launcher: 6.3.2
  image_picker: 1.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: 5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
