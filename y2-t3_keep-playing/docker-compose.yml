services:
  postgres:
    image: postgres:14
    environment:
      POSTGRES_DB: keep_playing
      POSTGRES_USER: keepplaying
      POSTGRES_PASSWORD: keepplaying
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keepplaying"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    environment:
      POSTGRES_DB_NAME: keep_playing
      POSTGRES_USER: keepplaying
      POSTGRES_PASSWORD: keepplaying
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      USE_S3: "False"
      EMAIL_NOTIFICATIONS_ENABLED: "False"
      ALLOWED_HOSTS: localhost,127.0.0.1,backend
    volumes:
      - ./backend/media:/app/media
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend

  backend-test:
    build:
      context: ./backend
      dockerfile: docker/Dockerfile
    environment:
      POSTGRES_DB_NAME: keep_playing
      POSTGRES_USER: keepplaying
      POSTGRES_PASSWORD: keepplaying
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: ["bash", "-c", "python manage.py makemigrations app --noinput && pytest --tb=short -q"]
    profiles: ["test"]

  frontend-test:
    build:
      context: ./frontend
      target: builder
    command: ["flutter", "test", "--reporter=compact"]
    profiles: ["test"]

volumes:
  pgdata:
